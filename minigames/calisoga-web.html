<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/x-icon" href="../favicon.ico?v=2">
    
    <title>Calisoga Web | Arcade</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Calisoga Web | Queefy Arcade">
    <meta property="og:description" content="Help Sarah Yamaguchi navigate through the Underground, Forest, and Space fields!">
    <meta property="og:image" content="https://ayanoosay.github.io/queefyrecords69/logo.jpeg">
    <meta name="theme-color" content="#ff3bb4">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            /* 🚫 KILL MOBILE DOUBLE-TAP ZOOMING ENTIRELY */
            touch-action: manipulation;
        }

        body {
            background-color: #030008;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%; left: -20%; width: 140%; height: 140%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(255, 59, 180, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(0, 191, 255, 0.1) 0%, transparent 40%);
            z-index: -1;
            filter: blur(40px);
        }

        header {
            position: fixed;
            top: 24px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 1200px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 28px; border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px) saturate(240%);
            -webkit-backdrop-filter: blur(40px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .brand-logo { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(255, 59, 180, 0.6); }
        .logo-text {
            font-size: 1.15rem; font-weight: 800; letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 0%, #ff73ca 50%, #30d5ff 100%);
            background-size: 200% 200%;
            animation: liquidText 4s ease infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .desktop-nav a {
            color: rgba(255, 255, 255, 0.75); text-decoration: none;
            font-size: 0.9rem; font-weight: 600;
        }
        .desktop-nav a:hover { color: #ff73ca; }

        @keyframes liquidText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🖥️ CABINET BOX FOR PC */
        .arcade-cabinet {
            background: #110924;
            border: 4px solid #30d5ff;
            border-radius: 12px;
            width: 95%; max-width: 1100px;
            padding: 24px;
            box-shadow: 0 0 40px rgba(48, 213, 255, 0.3), inset 0 0 15px rgba(0,0,0,0.8);
            margin-top: 100px;
            position: relative;
        }

        .game-hud {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; padding: 14px 24px;
            background: #000000; border: 2px solid #ff3bb4; border-radius: 4px;
        }

        .hud-item { font-size: 1.4rem; font-weight: bold; color: #fff; }
        .hud-item span { color: #ff73ca; text-shadow: 0 0 8px #ff73ca; }
        #stage-name { color: #30d5ff; text-shadow: 0 0 8px #30d5ff; }
        
        .hearts-container { display: flex; gap: 6px; font-size: 1.5rem; }

        /* 🎮 GIANT 16:9 CONTAINER BOX */
        .game-viewport {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 6px;
            border: 4px solid #070312;
            position: relative;
            overflow: hidden;
            background-color: #000;
            background-repeat: repeat;
            background-position: 0px 0px;
            background-size: auto 100%;
            z-index: 1;
        }

        /* 🎞️ Pixelated Blending Transition Underlayer */
        #bg-transition-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-repeat: repeat;
            background-size: auto 100%;
            opacity: 0;
            z-index: 2;
            transition: opacity 0.8s steps(8, end);
            pointer-events: none;
        }

        #bg-transition-layer.fade-in {
            opacity: 1;
        }

        /* CRT Raster Line Shading Filter */
        .game-viewport::after {
            content: " ";
            display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.22) 50%);
            z-index: 8; background-size: 100% 4px; pointer-events: none;
        }

        /* 👤 PLAYER AVATAR BOUNDS */
        #player-sarah {
            position: absolute;
            width: 120px; height: 120px;
            left: 100px; top: 200px;
            z-index: 5;
            object-fit: contain;
            transform: rotate(0deg);
            transition: transform 0.05s linear;
        }

        .invincible {
            animation: flashFrames 0.1s infinite alternate;
        }

        @keyframes flashFrames {
            0% { opacity: 0.25; }
            100% { opacity: 1; }
        }

        /* 👾 SCALED HAZARD OBSTACLES PROFILE */
        .obstacle {
            position: absolute;
            width: 70px; height: 70px;
            object-fit: contain;
            z-index: 4;
        }

        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 0, 8, 0.96);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; border-radius: 4px; text-align: center; padding: 20px;
        }

        .screen-overlay h2 {
            font-size: 3rem; font-weight: bold; margin-bottom: 12px;
            color: #30d5ff; text-shadow: 0 0 8px #30d5ff;
        }

        .screen-overlay p { color: #ff73ca; margin-bottom: 24px; font-size: 1.1rem; max-width: 600px; line-height: 1.5; }

        .start-btn {
            background: #30d5ff;
            color: #000; border: 2px solid #fff; padding: 14px 44px;
            font-size: 1.1rem; font-weight: bold;
            box-shadow: 0 6px 0 #1b8dae, 0 10px 15px rgba(0,0,0,0.4);
            transition: all 0.1s steps(2);
            cursor: pointer;
            z-index: 20;
        }
        .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1b8dae; }
        .start-btn.disabled { opacity: 0.4; pointer-events: none; }

        /* 📱 HORIZONTAL FIXED MOBILE ARCADEPAD LINK GRID */
        .mobile-controls {
            display: none;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 12px;
            margin-top: 20px;
            width: 100%;
            padding: 0;
            align-items: center;
        }

        .mob-btn {
            background: #090214; 
            border: 2px solid #30d5ff;
            color: #30d5ff; 
            padding: 16px 8px; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 1rem; 
            text-align: center;
            box-shadow: 0 0 10px rgba(48, 213, 255, 0.3), inset 0 0 4px rgba(48, 213, 255, 0.2);
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            text-shadow: 0 0 5px #30d5ff;
            transition: all 0.1s ease;
        }
        .mob-btn:active { 
            background: #30d5ff;
            color: #000;
            transform: scale(0.95);
            box-shadow: 0 0 20px #30d5ff;
        }
        
        .fly-cluster { 
            background: #140212;
            border-color: #ff3bb4; 
            color: #ff3bb4;
            font-size: 1.2rem; 
            padding: 18px 8px; 
            text-shadow: 0 0 5px #ff3bb4;
            box-shadow: 0 0 10px rgba(255, 59, 180, 0.3);
        }
        .fly-cluster:active {
            background: #ff3bb4;
            color: #000;
            box-shadow: 0 0 25px #ff3bb4;
        }

        /* 📱 RESPONSIVE PORTRAIT ANTI-CROP VIEWPORT ADJUSTMENTS */
        @media (max-width: 768px) {
            header { display: none; } 
            .mobile-controls { display: grid; margin-top: auto; }
            
            .arcade-cabinet {
                position: absolute;
                /* Reworked frame scaling parameters to eliminate screen crop margins */
                width: 82vh; 
                height: 88vw;
                max-width: 82vh;
                padding: 12px;
                transform: rotate(90deg) scale(1.3);
                margin-top: 0;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .game-viewport { width: 100%; aspect-ratio: 16 / 9; }
            .screen-overlay h2 { font-size: 1.4rem; }
            .screen-overlay p { font-size: 0.75rem; margin-bottom: 8px; }
            
            #player-sarah { width: 62px; height: 62px; } 
            .obstacle { width: 38px; height: 38px; }
            
            .hud-item { font-size: 0.9rem; }
            .start-btn { padding: 6px 18px; font-size: 0.85rem; }
            .mob-btn { padding: 10px 4px; font-size: 0.85rem; }
            .fly-cluster { padding: 12px 4px; font-size: 1rem; }
        }

        @media (max-width: 932px) and (orientation: landscape) {
            header { display: none; }
            .mobile-controls { display: grid; }
            .arcade-cabinet { margin-top: 10px; padding: 12px; max-width: 92vw; }
            #player-sarah { width: 75px; height: 75px; }
            .obstacle { width: 45px; height: 45px; }
            .hud-item { font-size: 1rem; }
            .screen-overlay h2 { font-size: 1.6rem; }
            .screen-overlay p { font-size: 0.85rem; margin-bottom: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="brand">
            <img src="../logo.jpeg" alt="Logo" class="brand-logo">
            <div class="logo-text">Queefy Arcade</div>
        </a>
        <nav class="desktop-nav">
            <a href="index.html">← EXIT</a>
        </nav>
    </header>

    <div class="arcade-cabinet">
        <div class="game-hud">
            <div class="hud-item">SCORE: <span id="score-val">000</span></div>
            <div class="hud-item"><span id="stage-name">THE UNDERGROUND</span></div>
            <div class="hud-item hearts-container" id="hearts-box">❤️❤️❤️</div>
        </div>

        <div class="game-viewport" id="viewport" style="background-image: url('underground.jpeg');">
            <div id="bg-transition-layer"></div>

            <div class="screen-overlay" id="overlay">
                <h2 id="overlay-title">LOADING ASSETS</h2>
                <p id="overlay-desc">PRE-CACHING TEXTURES AND SYSTEM DATA NODES FROM QUEEFY HUBS...</p>
                <button class="start-btn disabled" id="action-btn" onclick="startGame(event)">INITIALIZING...</button>
            </div>

            <img src="sarahmid.png" id="player-sarah" alt="Sarah Yamaguchi" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23ff73ca\'><rect x=\'4\' y=\'4\' width=\'16\' height=\'16\'/></svg>'">
        </div>

        <div class="mobile-controls">
            <div class="mob-btn" onpointerdown="handleMobileLeft(true, event)" onpointerup="handleMobileLeft(false, event)" onpointerleave="handleMobileLeft(false, event)">◀ LEFT</div>
            <div class="mob-btn fly-cluster" onpointerdown="handleMobileFlyTrigger(event)">FLY ⚡</div>
            <div class="mob-btn" onpointerdown="handleMobileRight(true, event)" onpointerup="handleMobileRight(false, event)" onpointerleave="handleMobileRight(false, event)">RIGHT ▶</div>
        </div>
    </div>

    <script>
        let player = {
            x: 100, y: 160,
            vy: 0, vx: 0,
            width: 120, height: 120, 
            speedX: 12.5,          
            jumpStrength: -8.8,   
            gravity: 0.46         
        };

        function syncHitboxDimensions() {
            if (window.matchMedia("(max-width: 768px)").matches) {
                player.width = 62;
                player.height = 62;
            } else {
                player.width = 120;
                player.height = 120;
            }
        }

        let score = 0;
        let lives = 3;
        let gameActive = false;
        let invincibilityFrames = 0;
        let currentStage = 1; 
        let bgScrollPosition = 0;
        let isTransitioning = false;

        let obstaclesList = [];
        let loopRef = null;
        let obstacleSpawnTimer = 0;
        let obstacleSpawnRate = 65; 

        let mobileLeftActive = false;
        let mobileRightActive = false;

        const viewport = document.getElementById('viewport');
        const bgTransitionLayer = document.getElementById('bg-transition-layer');
        const sarahSprite = document.getElementById('player-sarah');
        const scoreVal = document.getElementById('score-val');
        const stageName = document.getElementById('stage-name');
        const heartsBox = document.getElementById('hearts-box');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const actionBtn = document.getElementById('action-btn');

        const spriteUp = new Image(); spriteUp.src = 'sarahup.png';
        const spriteMid = new Image(); spriteMid.src = 'sarahmid.png';
        const spriteDown = new Image(); spriteDown.src = 'sarahdown.png';

        // 📦 HIGH-FIDELITY RETRO IMAGE LOADING PIPELINE
        const manifestAssets = ['underground.jpeg', 'forest.jpeg', 'space.jpeg', 'spider.png', 'web.png', 'calisoga.png', 'sarahup.png', 'sarahmid.png', 'sarahdown.png'];
        let loadedCount = 0;

        manifestAssets.forEach(src => {
            const cacheImg = new Image();
            cacheImg.src = src;
            cacheImg.onload = cacheImg.onerror = () => {
                loadedCount++;
                if (loadedCount === manifestAssets.length) {
                    unlockArcadeInterface();
                }
            };
        });

        function unlockArcadeInterface() {
            overlayTitle.innerText = "CALISOGA WEB";
            overlayDesc.innerHTML = "GUIDE SARAH YAMAGUCHI THROUGH THE GRID FIELDS! MANEUVER SECURELY PAST HAZARDS AS SPATIAL ANOMALIES SCALE OVER TIME.<br><br>PC: SPACE = FLY UP, A/D or ARROWS = STRAFE SIDEWAYS<br>MOBILE: USE MOVEMENT BUTTON CLUSTERS BELOW CABINET";
            actionBtn.innerText = "INSERT COIN";
            actionBtn.classList.remove('disabled');
        }

        let keyboardKeys = {};
        window.addEventListener('keydown', (e) => {
            keyboardKeys[e.code] = true;
            if (e.code === 'Space' && gameActive) {
                e.preventDefault();
                triggerFlyJump();
            }
            if(['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) e.preventDefault();
        });
        window.addEventListener('keyup', (e) => { keyboardKeys[e.code] = false; });

        function handleMobileLeft(isActive, e) { if(e) e.preventDefault(); mobileLeftActive = isActive; }
        function handleMobileRight(isActive, e) { if(e) e.preventDefault(); mobileRightActive = isActive; }

        function handleMobileFlyTrigger(e) {
            if(e) e.preventDefault();
            if(actionBtn.classList.contains('disabled')) return;
            if(!gameActive) {
                startGame();
            } else {
                triggerFlyJump();
            }
        }

        function triggerFlyJump() {
            if (!gameActive) return;
            player.vy = player.jumpStrength;
        }

        function startGame(e) {
            if(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            if(actionBtn.classList.contains('disabled')) return;
            
            score = 0;
            lives = 3;
            currentStage = 1;
            gameActive = true;
            invincibilityFrames = 0;
            bgScrollPosition = 0;
            isTransitioning = false;
            
            syncHitboxDimensions();
            obstaclesList.forEach(obs => obs.el.remove());
            obstaclesList = [];
            
            player.y = 120;
            player.x = 60;
            player.vy = 0;
            player.vx = 0;

            sarahSprite.style.transform = "rotate(0deg)"; 
            scoreVal.innerText = '000';
            stageName.innerText = "THE UNDERGROUND";
            viewport.style.backgroundImage = "url('underground.jpeg')";
            bgTransitionLayer.className = "";
            bgTransitionLayer.style.backgroundImage = "none";
            updateHeartsUI();

            overlay.style.display = 'none';

            cancelAnimationFrame(loopRef);
            loopRef = requestAnimationFrame(gameTickLoop);
        }

        function gameTickLoop() {
            if (!gameActive) return;

            processPhysicsVelocity();
            processStageProgression();
            processObstaclesEngine();
            processParallaxScrolling();

            loopRef = requestAnimationFrame(gameTickLoop);
        }

        function processPhysicsVelocity() {
            player.vx = 0;
            if (keyboardKeys['KeyA'] || keyboardKeys['ArrowLeft'] || mobileLeftActive) {
                player.vx = -player.speedX;
            }
            if (keyboardKeys['KeyD'] || keyboardKeys['ArrowRight'] || mobileRightActive) {
                player.vx = player.speedX;
            }

            player.vy += player.gravity;
            player.y += player.vy;
            player.x += player.vx;

            if (player.y < 0) { player.y = 0; player.vy = 0; }
            const maxFloorY = viewport.clientHeight - player.height;
            if (player.y > maxFloorY) { player.y = maxFloorY; player.vy = 0; }

            if (player.x < 0) player.x = 0;
            const maxRightX = viewport.clientWidth - player.width;
            if (player.x > maxRightX) player.x = maxRightX;

            if (player.vy < -1.5) {
                sarahSprite.src = spriteUp.complete ? 'sarahup.png' : sarahSprite.src;
            } else if (player.vy > 2) {
                sarahSprite.src = spriteDown.complete ? 'sarahdown.png' : sarahSprite.src;
            } else {
                sarahSprite.src = spriteMid.complete ? 'sarahmid.png' : sarahSprite.src;
            }

            sarahSprite.style.top = `${player.y}px`;
            sarahSprite.style.left = `${player.x}px`;

            if (invincibilityFrames > 0) {
                invincibilityFrames--;
                if (invincibilityFrames <= 0) sarahSprite.classList.remove('invincible');
            }
        }

        function processStageProgression() {
            score += 0.08; 
            let displayScore = Math.floor(score);
            scoreVal.innerText = String(displayScore).padStart(3, '0');

            if (displayScore >= 510 && currentStage !== 3) {
                triggerStageTransition(3, "SPACE DEEP", "space.jpeg");
            } else if (displayScore >= 210 && displayScore < 510 && currentStage !== 2) {
                triggerStageTransition(2, "THE FOREST FIELDS", "forest.jpeg");
            }
        }

        function triggerStageTransition(nextStage, nextStageName, nextBgImage) {
            if (isTransitioning) return;
            isTransitioning = true;
            currentStage = nextStage;
            stageName.innerText = nextStageName;

            bgTransitionLayer.style.backgroundImage = `url('${nextBgImage}')`;
            bgTransitionLayer.classList.add('fade-in');

            setTimeout(() => {
                viewport.style.backgroundImage = `url('${nextBgImage}')`;
                bgTransitionLayer.classList.remove('fade-in');
                bgTransitionLayer.style.backgroundImage = "none";
                isTransitioning = false;
            }, 800); 
        }

        function processParallaxScrolling() {
            let scrollSpeed = 2.5 + Math.floor(Math.floor(score) / 100) * 0.5;
            bgScrollPosition -= scrollSpeed;
            
            viewport.style.backgroundPosition = `${bgScrollPosition}px 0px`;
            bgTransitionLayer.style.backgroundPosition = `${bgScrollPosition}px 0px`;
        }

        function processObstaclesEngine() {
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer >= obstacleSpawnRate) {
                obstacleSpawnTimer = 0;
                spawnDynamicObstacle();
            }

            let movementSpeed = 6.8 + Math.floor(Math.floor(score) / 100) * 1.4;

            for (let i = obstaclesList.length - 1; i >= 0; i--) {
                let obs = obstaclesList[i];
                obs.x -= movementSpeed;
                obs.el.style.left = `${obs.x}px`;

                if (checkCollision(player, obs)) {
                    triggerPlayerHit();
                }

                if (obs.x < -80) {
                    obs.el.remove();
                    obstaclesList.splice(i, 1);
                }
            }
        }

        function spawnDynamicObstacle() {
            const el = document.createElement('img');
            el.className = 'obstacle';
            
            const options = ['spider.png', 'web.png', 'calisoga.png'];
            const chosenAsset = options[Math.floor(Math.random() * options.length)];
            el.src = chosenAsset;
            
            el.onerror = function() {
                this.src = 'data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%2300bfff\'><rect x=\'4\' y=\'4\' width=\'16\' height=\'16\'/></svg>';
            };

            const spawnX = viewport.clientWidth + 20;
            const spawnY = Math.random() * (viewport.clientHeight - 70);

            el.style.left = `${spawnX}px`;
            el.style.top = `${spawnY}px`;
            viewport.appendChild(el);

            let obsSize = window.matchMedia("(max-width: 768px)").matches ? 38 : 60;

            obstaclesList.push({
                el: el,
                x: spawnX, y: spawnY,
                width: obsSize, height: obsSize 
            });
        }

        function checkCollision(rect1, rect2) {
            let pad = window.matchMedia("(max-width: 768px)").matches ? 10 : 24;
            return (
                rect1.x + pad < rect2.x + rect2.width &&
                rect1.x + rect1.width - pad > rect2.x &&
                rect1.y + pad < rect2.y + rect2.height &&
                rect1.y + rect1.height - pad > rect2.y
            );
        }

        function triggerPlayerHit() {
            if (invincibilityFrames > 0 || !gameActive) return;

            lives--;
            updateHeartsUI();
            invincibilityFrames = 60; 
            player.vy = -3.5; 
            sarahSprite.classList.add('invincible');

            if (lives <= 0) triggerGameOverAnimation();
        }

        function updateHeartsUI() {
            let heartStr = '';
            for (let i = 0; i < 3; i++) {
                heartStr += (i < lives) ? '❤️' : '🖤';
            }
            heartsBox.innerText = heartStr;
        }

        // 🎬 STABLE CROSS-PLATFORM FIXED GAME OVER LOOP
        function triggerGameOverAnimation() {
            gameActive = false;
            
            let fallRotation = 0;
            let currentY = player.y;
            let currentVy = player.vy;

            let animateFallInterval = setInterval(() => {
                currentVy += 0.55; 
                currentY += currentVy;
                fallRotation += 20; 
                
                sarahSprite.style.top = `${currentY}px`;
                sarahSprite.style.transform = `rotate(${fallRotation}deg)`;

                // Dynamic bounding context relative evaluation checks
                if (currentY > viewport.clientHeight + 80) {
                    clearInterval(animateFallInterval);
                    displayGameOverModal();
                }
            }, 20);
        }

        function displayGameOverModal() {
            overlayTitle.innerText = "DIALOUT LOSS";
            overlayDesc.innerHTML = `Matrix integrity compromised across stages.<br><br>Final Flight Record score: <span style='color:#30d5ff; font-weight:bold;'>${String(Math.floor(score)).padStart(3, '0')} PTS</span>`;
            actionBtn.innerText = "INSERT COIN REBOOT";
            overlay.style.display = 'flex';
        }

        window.addEventListener('resize', syncHitboxDimensions);
    </script>
</body>
</html>
