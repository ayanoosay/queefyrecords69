<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../favicon.ico?v=2">
    
    <title>FIST-A-GABRI | Arcade Grid</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="FIST-A-GABRI | Queefy Arcade">
    <meta property="og:description" content="Whack-a-Gabri! Grab your wet fist controller and beat the pixel grid.">
    <meta property="og:image" content="https://ayanoosay.github.io/queefyrecords69/logo.jpeg">
    <meta name="theme-color" content="#ff3bb4">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            /* Hard pixel graphics rendering layout toggle */
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            background-color: #030008;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: none !important;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%; left: -20%; width: 140%; height: 140%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(255, 59, 180, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(0, 191, 255, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.08) 0%, transparent 45%);
            z-index: -1;
            filter: blur(40px);
        }

        /* 💦 Wet Pixel Follower Controller Handle Cursor */
        #custom-fist-cursor {
            position: fixed;
            width: 90px;
            height: 90px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        #custom-fist-cursor img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform-origin: bottom center;
        }

        body:active #custom-fist-cursor img {
            transform: scale(0.8) rotate(-15deg);
        }

        /* Fluid Dripping Particle Drop Tracer */
        .drip-particle {
            position: fixed;
            width: 8px;
            height: 14px;
            background: #30d5ff;
            box-shadow: 0 0 4px #30d5ff;
            pointer-events: none;
            z-index: 9998;
            animation: dropDown 0.5s steps(6, end) forwards;
        }

        @keyframes dropDown {
            0% { transform: translateY(0) scaleY(1); opacity: 1; }
            100% { transform: translateY(50px) scaleY(0.4); opacity: 0; }
        }

        header {
            position: fixed;
            top: 24px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 1200px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 28px; border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px) saturate(240%);
            -webkit-backdrop-filter: blur(40px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .brand-logo { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid rgba(255, 59, 180, 0.6); }
        .logo-text {
            font-size: 1.15rem; font-weight: 800; letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 0%, #ff73ca 50%, #30d5ff 100%);
            background-size: 200% 200%;
            animation: liquidText 4s ease infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .desktop-nav a {
            color: rgba(255, 255, 255, 0.75); text-decoration: none;
            font-size: 0.9rem; font-weight: 600; cursor: none;
        }
        .desktop-nav a:hover { color: #ff73ca; }

        .arcade-cabinet {
            background: #140727;
            border: 4px solid #ff3bb4;
            border-radius: 12px;
            width: 92%; max-width: 580px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 59, 180, 0.3), inset 0 0 15px rgba(0,0,0,0.8);
            margin-top: 110px;
            position: relative;
        }

        .game-hud {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding: 12px 20px;
            background: #000000; border: 2px solid #30d5ff; border-radius: 4px;
            box-shadow: 0 0 10px rgba(48, 213, 255, 0.3);
        }

        .hud-item { font-size: 1.2rem; font-weight: bold; color: #fff; text-shadow: 0 0 4px #fff; }
        .hud-item span { color: #30d5ff; text-shadow: 0 0 8px #30d5ff; }
        #score-val { color: #ff73ca; text-shadow: 0 0 8px #ff73ca; }

        /* 🟩 Retro Whack-A-Mole Green Arena Field */
        .mole-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
            height: 400px;
            background-color: #1a7a2a; /* Rich arcade field green background */
            background-image: 
                radial-gradient(#249436 20%, transparent 20%),
                radial-gradient(#1e852f 20%, transparent 20%);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
            border-radius: 8px;
            padding: 24px;
            border: 4px solid #0b3a0f;
            position: relative;
            overflow: hidden;
        }

        /* Scanline CRT glass overlay look */
        .mole-grid::after {
            content: " ";
            display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 0, 0.06));
            z-index: 8; background-size: 100% 4px, 6px 100%; pointer-events: none;
        }

        .grid-hole {
            background: #091a0c;
            border-radius: 50%;
            border: 4px solid #050d06;
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.85);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 👤 Gabri target head image element - MADE BIGGER HERE */
        .mole-target {
            width: 115%;
            height: 115%;
            object-fit: contain;
            position: absolute;
            bottom: -130%; /* Kept hidden below the frame edge vector */
            transition: bottom 0.1s steps(4); /* Chonky arcade step translation transition */
            cursor: none;
            z-index: 5;
        }

        .mole-target.up {
            bottom: -15%; /* Pops up perfectly inside the hole field box zone */
        }

        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 0, 8, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; border-radius: 4px; text-align: center; padding: 20px;
        }

        .screen-overlay h2 {
            font-size: 2.2rem; font-weight: bold; margin-bottom: 12px;
            color: #ff3bb4; text-shadow: 0 0 8px #ff3bb4;
        }

        .screen-overlay p { color: #30d5ff; margin-bottom: 24px; font-size: 0.95rem; max-width: 400px; line-height: 1.4; }

        .start-btn {
            background: #ff3bb4;
            color: white; border: 2px solid #fff; padding: 12px 36px;
            font-size: 1rem; font-weight: bold;
            box-shadow: 0 6px 0 #b31d77, 0 10px 15px rgba(0,0,0,0.4);
            transition: all 0.1s steps(2);
            cursor: none;
        }
        .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b31d77; }

        .hit-effect {
            position: absolute; pointer-events: none;
            font-size: 1.2rem; font-weight: bold; color: #30d5ff;
            text-shadow: 0 0 6px #30d5ff; animation: pixelFloat 0.3s steps(4) forwards;
            z-index: 6;
        }

        @keyframes pixelFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div id="custom-fist-cursor">
        <img src="fist.png" alt="Wet Fist" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23ff3bb4\'><rect x=\'6\' y=\'6\' width=\'12\' height=\'12\'/></svg>'">
    </div>

    <header>
        <a href="index.html" class="brand">
            <img src="../logo.jpeg" alt="Logo" class="brand-logo">
            <div class="logo-text">Queefy Arcade</div>
        </a>
        <nav class="desktop-nav">
            <a href="index.html">← EXIT</a>
        </nav>
    </header>

    <div class="arcade-cabinet">
        <div class="game-hud">
            <div class="hud-item">SCORE: <span id="score-val">000</span></div>
            <div class="hud-item">TIME: <span id="time-val">30</span>S</div>
        </div>

        <div class="mole-grid" id="game-grid">
            <div class="screen-overlay" id="overlay">
                <h2 id="overlay-title">FIST-A-GABRI</h2>
                <p id="overlay-desc">ANOMALY DETECTED IN THE SOIL FIELDS! SMASH THE GABRI HEADSHOTS WITH YOUR WET FIST BEFORE THEY SLIDE UNDERGROUND.</p>
                <button class="start-btn" id="action-btn" onclick="startGame()">INSERT COIN</button>
            </div>

            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="0" onpointerdown="whackMole(this, event)"></div>
            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="1" onpointerdown="whackMole(this, event)"></div>
            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="2" onpointerdown="whackMole(this, event)"></div>
            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="3" onpointerdown="whackMole(this, event)"></div>
            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="4" onpointerdown="whackMole(this, event)"></div>
            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="5" onpointerdown="whackMole(this, event)"></div>
            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="6" onpointerdown="whackMole(this, event)"></div>
            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="7" onpointerdown="whackMole(this, event)"></div>
            <div class="grid-hole"><img src="gabrihead.png" class="mole-target" data-index="8" onpointerdown="whackMole(this, event)"></div>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let currentActiveMole = null;
        let moleTimeout = null;
        let countdownTimer = null;
        let spawnDelay = 800; 

        const cursor = document.getElementById('custom-fist-cursor');
        const gridHoles = document.querySelectorAll('.mole-target');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const actionBtn = document.getElementById('action-btn');
        
        const scoreVal = document.getElementById('score-val');
        const timeVal = document.getElementById('time-val');

        // Capture mouse movement coordinates
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = `${e.clientX}px`;
            cursor.style.top = `${e.clientY}px`;
            
            // Generate fluid wet trails dripping down
            if (Math.random() < 0.15) {
                spawnPixelDrip(e.clientX, e.clientY);
            }
        });

        function spawnPixelDrip(x, y) {
            const particle = document.createElement('div');
            particle.className = 'drip-particle';
            particle.style.left = `${x + (Math.floor(Math.random() * 24) - 12)}px`;
            particle.style.top = `${y + 30}px`;
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 500);
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameActive = true;
            scoreVal.innerText = '000';
            timeVal.innerText = timeLeft;
            overlay.style.display = 'none';

            startCountdown();
            nextMoleCycle();
        }

        function startCountdown() {
            clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                timeLeft--;
                timeVal.innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function nextMoleCycle() {
            if (!gameActive) return;

            if (currentActiveMole) {
                currentActiveMole.classList.remove('up');
            }

            // Select random soil location
            const randomIndex = Math.floor(Math.random() * gridHoles.length);
            currentActiveMole = gridHoles[randomIndex];
            currentActiveMole.classList.add('up');

            // Accelerate popup frequency based on points acquired
            let dynamicSpeed = Math.max(450, spawnDelay - Math.floor(score / 30) * 40);

            clearTimeout(moleTimeout);
            moleTimeout = setTimeout(() => {
                nextMoleCycle();
            }, dynamicSpeed);
        }

        function whackMole(element, event) {
            if (!gameActive || !element.classList.contains('up')) return;
            
            score += 10;
            // Pad out numerical string score format text output fields to match arcade style (e.g. 020)
            scoreVal.innerText = String(score).padStart(3, '0');
            
            element.classList.remove('up');
            
            spawnHitVisual(element.parentElement, event.clientX, event.clientY);
            
            clearTimeout(moleTimeout);
            nextMoleCycle();
        }

        function spawnHitVisual(parentSlot, clientX, clientY) {
            const rect = parentSlot.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.left = `${x}px`;
            effect.style.top = `${y}px`;
            
            const textOptions = ['💦 SPLAT!', '💦 WACK!', '💦 FIST!', '💦 SMASH!'];
            effect.innerText = textOptions[Math.floor(Math.random() * textOptions.length)];

            parentSlot.appendChild(effect);
            setTimeout(() => effect.remove(), 300);
        }

        function endGame() {
            gameActive = false;
            clearTimeout(moleTimeout);
            clearInterval(countdownTimer);
            
            gridHoles.forEach(h => h.classList.remove('up'));

            overlayTitle.innerText = "GAME OVER";
            overlayDesc.innerHTML = `ANOMALY TIMEOUT CLEAR.<br><br>TOTAL SCORE RATINGS: <span style='color:#ff73ca; font-weight:bold;'>${String(score).padStart(3, '0')} PTS</span>`;
            actionBtn.innerText = "CONTINUE?";
            overlay.style.display = 'flex';
        }
    </script>
</body>
</html>
