<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyQueefs | Exclusive Feed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #030008;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(255, 59, 180, 0.18) 0%, transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(0, 191, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.1) 0%, transparent 45%);
            z-index: -1;
            filter: blur(40px);
        }

        @keyframes liquidText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px) saturate(240%);
            -webkit-backdrop-filter: blur(40px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                -0.6px 0 1px rgba(255, 0, 128, 0.4),  
                0.6px 0 1px rgba(0, 229, 255, 0.4),  
                0 10px 40px rgba(0, 0, 0, 0.5),      
                inset 0 1px 1px rgba(255, 255, 255, 0.3); 
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1001;
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 59, 180, 0.6);
            object-fit: cover;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 0%, #ff73ca 50%, #30d5ff 100%);
            background-size: 200% 200%;
            animation: liquidText 4s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desktop-nav a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            padding: 6px 0;
        }

        .desktop-nav a.active {
            color: #ff73ca;
            text-shadow: 0 0 15px rgba(255, 59, 180, 0.5);
        }

        .desktop-nav a:hover {
            color: #ffffff;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 20px;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
            background-color: #ff3bb4;
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
            transform: translateX(-20px);
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
            background-color: #00bfff;
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, rgba(3, 0, 8, 0.7) 0%, rgba(17, 5, 28, 0.8) 100%);
            backdrop-filter: blur(40px) saturate(240%);
            -webkit-backdrop-filter: blur(40px) saturate(240%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(-5%);
        }

        .mobile-menu.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .mobile-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(20px);
            opacity: 0;
        }

        .mobile-menu.active .mobile-link {
            transform: translateY(0);
            opacity: 1;
        }

        .mobile-menu.active .mobile-link:nth-child(1) { transition-delay: 0.1s; }
        .mobile-menu.active .mobile-link:nth-child(2) { transition-delay: 0.15s; }
        .mobile-menu.active .mobile-link:nth-child(3) { transition-delay: 0.2s; }
        .mobile-menu.active .mobile-link:nth-child(4) { transition-delay: 0.25s; }

        .mobile-link:hover, .mobile-link:active {
            color: #ffffff;
            transform: scale(1.1);
            text-shadow: 0 0 20px rgba(255, 59, 180, 0.6);
        }

        .feed-container {
            max-width: 650px;
            margin: 140px auto 100px;
            padding: 0 20px;
            /* Prevent any child from blowing out the container width */
            min-width: 0;
            overflow: hidden;
        }

        .feed-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .feed-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 15%, #ff46bd 55%, #00e5ff 100%);
            background-size: 200% 200%;
            animation: liquidText 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feed-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .fake-composer {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .fake-composer input {
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            width: 100%;
            outline: none;
        }

        .queef-post {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
            transition: transform 0.3s ease, border-color 0.3s ease;
            position: relative;
            /* Critical: prevent children from blowing out card width */
            min-width: 0;
            overflow: hidden;
        }

        .queef-post:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 59, 180, 0.4);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            position: relative;
            z-index: 6; 
        }

        .profile-click-wrapper {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 0;
        }

        .profile-click-wrapper:hover h4 {
            color: #ff73ca;
        }

        .post-avatar {
            width: 50px;
            height: 50px;
            min-width: 50px; /* prevent shrinking */
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .post-info {
            min-width: 0; /* allow text truncation inside flex */
        }

        .post-info h4 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .post-info span {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .verified-badge {
            display: inline-block;
            width: 14px;
            height: 14px;
            min-width: 14px;
            background: #00e5ff;
            border-radius: 50%;
            position: relative;
        }
        .verified-badge::after {
            content: '✓';
            color: #030008;
            font-size: 10px;
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* ---- KEY FIX: post content link handling ---- */
        .post-content {
            font-size: 1.15rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            white-space: pre-wrap;
            /* Break long URLs/words so they don't overflow on mobile */
            word-break: break-word;
            overflow-wrap: break-word;
            /* Ensure content stays within card */
            min-width: 0;
            max-width: 100%;
        }

        /* Links inside post content: truncate visually with ellipsis on small screens */
        .post-content a {
            color: #30d5ff;
            text-decoration: none;
            /* On mobile, long URLs get truncated with "..." */
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: bottom;
        }

        .post-content a:hover {
            text-decoration: underline;
            color: #ff73ca;
        }
        /* ---- END KEY FIX ---- */

        .post-media {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: block; /* prevent inline gap */
        }

        .post-actions {
            display: flex;
            gap: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 15px;
            position: relative;
            z-index: 10;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-btn:hover { color: #00e5ff; }
        .action-btn:hover svg { transform: scale(1.15); }
        .action-btn.liked { color: #ff3bb4; }
        .action-btn.liked svg { transform: scale(1.2); }

        .loading-text {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-style: italic;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            header { top: 12px; padding: 10px 20px; width: 95%; }
            .desktop-nav { display: none; }
            .hamburger { display: flex; }
            .feed-header h1 { font-size: 2.4rem; }

            /* On mobile, link text is truncated — full URL still clickable */
            .post-content a {
                max-width: min(100%, 220px);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="../logo.jpeg" alt="Logo" class="brand-logo">
            <div class="logo-text">Queefy Records69</div>
        </div>
        
        <nav class="desktop-nav">
            <a href="../index.html">Home</a>
            <a href="../index.html#roster">Roster</a>
            <a href="../events/">Events</a>
            <a href="#" class="active">OnlyQueefs</a>
        </nav>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="mobile-menu" id="mobile-menu">
        <a href="../index.html" class="mobile-link">Home</a>
        <a href="../index.html#roster" class="mobile-link">Roster</a>
        <a href="../events/" class="mobile-link">Events</a>
        <a href="#" class="mobile-link" style="color: #ff73ca; text-shadow: 0 0 20px rgba(255, 59, 180, 0.6);">OnlyQueefs</a>
    </div>

    <div class="feed-container">
        <div class="feed-header">
            <h1>OnlyQueefs</h1>
            <p>The exclusive timeline. Only verified artists can post.</p>
        </div>

        <div class="fake-composer">
            <img src="../logo.jpeg" alt="Guest" class="post-avatar" style="width: 40px; height: 40px; opacity: 0.5;">
            <input type="text" placeholder="Only verified label members can Queef..." disabled>
        </div>

        <div id="dynamic-feed">
            <div class="loading-text">Loading the latest Queefs...</div>
        </div>

    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
            
            if(mobileMenu.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        });

        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                mobileMenu.classList.remove('active');
                document.body.style.overflow = 'auto';
            });
        });
    </script>

    <script>
        const csvLink = "https://docs.google.com/spreadsheets/d/1pYMnzTwBwkopjhsTPxVgu_vAxg39o9uxmRb3e2oaMZo/export?format=csv";

        const artistData = {
            "Sarah Yamaguchi": { handle: "@sarahyamaguchi", image: "../sarahyamaguchi.png" },
            "Gabri Hannah": { handle: "@gabrihannah", image: "../gabrihannah.png" },
            "Kurai Hana": { handle: "@kuraihanaofi", image: "../kuraihana.png" },
            "Stella Sukehiro": { handle: "@stellasukehiro", image: "../stellasukehiro.png" },
            "Mazie LaRosa": { handle: "@mazielarosa", image: "../mazielarosa.png" },
            "Anna Martinez": { handle: "@annamartinez", image: "../annamartinez.jpg" },
            "Bhad Belle": { handle: "@bhadbelle", image: "../bhadbelle.png" },
            "Billoga": { handle: "@billoga", image: "../billoga.png" },
            "Queefy Records Official": { handle: "@queefyrecords", image: "../logo.jpeg" } 
        };

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        /**
         * Converts plain-text URLs in a string into clickable <a> tags.
         * The visible label is truncated with "..." if it's too long,
         * but the href always holds the full URL so it's clickable.
         */
        function linkifyContent(text) {
            // Escape HTML first to prevent injection
            const escaped = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return escaped.replace(urlRegex, (url) => {
                // Decode for display, truncate if needed
                let display = url;
                try { display = decodeURIComponent(url); } catch(e) {}
                const MAX = 40;
                if (display.length > MAX) {
                    display = display.slice(0, MAX) + '…';
                }
                return `<a href="${url}" target="_blank" rel="noopener noreferrer">${display}</a>`;
            });
        }

        if (csvLink) {
            Papa.parse(csvLink, {
                download: true,
                header: true,
                complete: function(results) {
                    const feed = document.getElementById('dynamic-feed');
                    feed.innerHTML = ""; 
                    
                    let posts = results.data.reverse();

                    posts.forEach(post => {
                        if (!post["Artist Name"]) return;

                        let artistName = post["Artist Name"];
                        let content = post["Post Content"] || "";
                        let mediaUrl = post["Media URL"]; 
                        let time = post["Timestamp"] ? post["Timestamp"].split(" ")[0] : "Just now";
                        
                        let profile = artistData[artistName] || { handle: "@artist", image: "../logo.jpeg" };

                        let uniquePostId = "post_" + hashCode(artistName + content + time);
                        let baseLikes = (hashCode(content + artistName) % 3700) + 300;
                        
                        let isLiked = localStorage.getItem(uniquePostId) === "liked";
                        let displayLikes = isLiked ? baseLikes + 1 : baseLikes;
                        let heartClass = isLiked ? "action-btn like-btn liked" : "action-btn like-btn";

                        let mediaHTML = '';
                        if (mediaUrl && mediaUrl.trim() !== "") {
                            if (mediaUrl.toLowerCase().includes('.mp4') || mediaUrl.toLowerCase().includes('.webm')) {
                                mediaHTML = `<video src="${mediaUrl.trim()}" class="post-media" controls autoplay muted loop></video>`;
                            } else {
                                mediaHTML = `<img src="${mediaUrl.trim()}" alt="Post Media" class="post-media">`;
                            }
                        }

                        // Use linkifyContent so URLs become clickable and truncated
                        let contentHTML = linkifyContent(content);

                        let postHTML = `
                        <div class="queef-post">
                            <div class="post-header">
                                <a href="profile.html?artist=${encodeURIComponent(artistName)}" class="profile-click-wrapper">
                                    <img src="${profile.image}" alt="${artistName}" class="post-avatar">
                                    <div class="post-info">
                                        <h4>${artistName} <span class="verified-badge"></span></h4>
                                        <span>${profile.handle} • ${time}</span>
                                    </div>
                                </a>
                            </div>
                            <div class="post-content">${contentHTML}</div>
                            ${mediaHTML}
                            <div class="post-actions">
                                <div class="${heartClass}" data-post-id="${uniquePostId}" data-base-likes="${baseLikes}">
                                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                    <span class="like-count">${displayLikes.toLocaleString()}</span>
                                </div>
                                <div class="action-btn" onclick="alert('Anonymous comments coming soon!')">
                                    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/></svg>
                                    <span>${(baseLikes % 85) + 12}</span>
                                </div>
                                <div class="action-btn" onclick="alert('Sending Anon DM to ${artistName}...')">
                                    <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                                    <span>DM</span>
                                </div>
                            </div>
                        </div>`;
                        
                        feed.innerHTML += postHTML;
                    });

                    document.querySelectorAll('.like-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            let countSpan = this.querySelector('.like-count');
                            let baseNumber = parseInt(this.getAttribute('data-base-likes'));
                            let postId = this.getAttribute('data-post-id');

                            if (this.classList.contains('liked')) {
                                this.classList.remove('liked');
                                countSpan.innerText = baseNumber.toLocaleString();
                                localStorage.removeItem(postId);
                            } else {
                                this.classList.add('liked');
                                countSpan.innerText = (baseNumber + 1).toLocaleString();
                                localStorage.setItem(postId, "liked");
                            }
                        });
                    });
                }
            });
        }
    </script>

</body>
</html>
