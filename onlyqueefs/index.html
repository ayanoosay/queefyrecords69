<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyQueefs | Exclusive Feed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #030008;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(255, 59, 180, 0.18) 0%, transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(0, 191, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.1) 0%, transparent 45%);
            z-index: -1;
            filter: blur(40px);
        }

        @keyframes liquidText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px) saturate(240%);
            -webkit-backdrop-filter: blur(40px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                -0.6px 0 1px rgba(255, 0, 128, 0.4),  
                0.6px 0 1px rgba(0, 229, 255, 0.4),  
                0 10px 40px rgba(0, 0, 0, 0.5),      
                inset 0 1px 1px rgba(255, 255, 255, 0.3); 
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1001;
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 59, 180, 0.6);
            object-fit: cover;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 0%, #ff73ca 50%, #30d5ff 100%);
            background-size: 200% 200%;
            animation: liquidText 4s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desktop-nav {
            display: flex;
            align-items: center;
        }

        .desktop-nav a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            padding: 6px 0;
        }

        .desktop-nav a.active {
            color: #ff73ca;
            text-shadow: 0 0 15px rgba(255, 59, 180, 0.5);
        }

        .desktop-nav a:hover {
            color: #ffffff;
        }

        .auth-btn {
            background: linear-gradient(135deg, #ff3bb4 0%, #00bfff 100%);
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            margin-left: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.2s ease;
        }

        .auth-btn:hover {
            transform: scale(1.05);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 20px;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            height: 2px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .hamburger.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); background-color: #ff3bb4; }
        .hamburger.active span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .hamburger.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); background-color: #00bfff; }

        .mobile-menu {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(135deg, rgba(3, 0, 8, 0.95) 0%, rgba(17, 5, 28, 0.98) 100%);
            backdrop-filter: blur(40px) saturate(240%);
            z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;
            opacity: 0; pointer-events: none; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(-5%);
        }

        .mobile-menu.active { opacity: 1; pointer-events: all; transform: translateY(0); }

        .mobile-link {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 2rem;
            font-weight: 800;
            transition: all 0.4s;
        }

        .mobile-auth-btn {
            background: linear-gradient(135deg, #ff3bb4 0%, #00bfff 100%);
            border: none;
            color: white;
            padding: 12px 32px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .cute-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 0, 8, 0.6);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .cute-modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .cute-modal-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            padding: 35px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .cute-modal-overlay.active .cute-modal-card {
            transform: scale(1);
        }
        .cute-modal-card h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #ff73ca 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .cute-modal-card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }
        .cute-form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .cute-form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 6px;
            padding-left: 4px;
        }
        .cute-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .cute-input:focus {
            border-color: #ff73ca;
        }
        .cute-submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff3bb4 0%, #00bfff 100%);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(255, 59, 180, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .cute-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(255, 59, 180, 0.4);
        }
        .cute-toggle-link {
            display: inline-block;
            margin-top: 18px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: color 0.2s;
        }
        .cute-toggle-link span {
            color: #30d5ff;
            font-weight: 600;
        }
        .cute-toggle-link:hover {
            color: white;
        }
        .cute-close-btn {
            position: absolute;
            top: 16px; right: 20px;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: color 0.2s;
        }
        .cute-close-btn:hover { color: white; }

        .feed-container {
            max-width: 650px;
            margin: 140px auto 100px;
            padding: 0 20px;
            min-width: 0;
            overflow: hidden;
        }

        .feed-header { text-align: center; margin-bottom: 40px; }
        .feed-header h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 15%, #ff46bd 55%, #00e5ff 100%);
            background-size: 200% 200%;
            animation: liquidText 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .feed-header p { color: rgba(255, 255, 255, 0.6); font-size: 1.1rem; margin-top: 10px; }

        .queef-post {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            position: relative;
        }

        .post-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .profile-click-wrapper { text-decoration: none; color: inherit; display: flex; align-items: center; gap: 15px; }
        .post-avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .post-info h4 { font-size: 1.1rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 5px; }
        .post-info span { font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); display: block; }
        .verified-badge { display: inline-block; width: 14px; height: 14px; background: #00e5ff; border-radius: 50%; position: relative; }
        .verified-badge::after { content: '✓'; color: #030008; font-size: 10px; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .post-content { font-size: 1.15rem; line-height: 1.5; color: rgba(255, 255, 255, 0.9); margin-bottom: 20px; white-space: pre-wrap; word-break: break-word; }
        .post-content a { color: #30d5ff; text-decoration: none; }
        .post-media { width: 100%; max-height: 500px; object-fit: cover; border-radius: 16px; margin-bottom: 20px; }

        .post-actions { display: flex; gap: 25px; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 15px; }
        .action-btn { display: flex; align-items: center; gap: 8px; color: rgba(255, 255, 255, 0.5); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .action-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .action-btn.liked { color: #ff3bb4; }

        .comments-section { margin-top: 15px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .comment-list { max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
        
        .comment-item { 
            font-size: 0.9rem; 
            padding: 8px 12px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 8px; 
            margin-bottom: 6px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .comment-item strong { color: #ff73ca; }
        
        .comment-delete-btn {
            background: transparent;
            border: none;
            color: rgba(255, 71, 114, 0.6);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 0.85rem;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .comment-delete-btn:hover {
            color: #ff4772;
            background: rgba(255, 71, 114, 0.1);
        }

        .comment-input-box { display: flex; gap: 10px; position: relative; }
        .comment-input-box input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 20px; color: white; outline: none; }
        .comment-submit-btn { background: #30d5ff; color: #000; border: none; padding: 0 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .comment-error-msg {
            display: none;
            color: #ff4772;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 6px;
            padding-left: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-3px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-text { text-align: center; color: rgba(255,255,255,0.5); margin-top: 40px; }

        @media (max-width: 768px) {
            header { top: 12px; padding: 10px 20px; width: 95%; }
            .desktop-nav { display: none; }
            .hamburger { display: flex; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="../logo.jpeg" alt="Logo" class="brand-logo">
            <div class="logo-text">Queefy Records69</div>
        </div>
        
        <nav class="desktop-nav">
            <a href="../index.html">Home</a>
            <a href="../index.html#roster">Roster</a>
            <a href="../events/">Events</a>
            <a href="#" class="active">OnlyQueefs</a>
            <button class="auth-btn" id="login-btn" onclick="openAuthModal()">Sign In</button>
        </nav>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="mobile-menu" id="mobile-menu">
        <a href="../index.html" class="mobile-link">Home</a>
        <a href="../index.html#roster" class="mobile-link">Roster</a>
        <a href="../events/" class="mobile-link">Events</a>
        <button class="mobile-auth-btn" id="mobile-login-btn" onclick="openAuthModal()">Sign In</button>
    </div>

    <div class="cute-modal-overlay" id="authModal" onclick="closeAuthModalViaOverlay(event)">
        <div class="cute-modal-card" style="position: relative;">
            <div class="cute-close-btn" onclick="closeAuthModal()">&times;</div>
            <h2 id="modalTitle">Welcome Back</h2>
            <p id="modalSubtitle">Log into your profile to start commenting</p>
            
            <form onsubmit="handleAuthSubmit(event)">
                <div class="cute-form-group">
                    <label for="authEmail">Email Address</label>
                    <input type="email" id="authEmail" class="cute-input" placeholder="you@example.com" autocomplete="username" required>
                </div>
                <div class="cute-form-group">
                    <label for="authPassword">Password</label>
                    <input type="password" id="authPassword" class="cute-input" placeholder="••••••••" minlength="6" autocomplete="current-password" required>
                </div>
                <button type="submit" id="modalSubmitBtn" class="cute-submit-btn">Sign In</button>
            </form>
            
            <div class="cute-toggle-link" id="modalToggleLink" onclick="toggleAuthMode()">
                Don't have an account? <span>Sign Up</span>
            </div>
        </div>
    </div>

    <div class="feed-container">
        <div class="feed-header">
            <h1>OnlyQueefs</h1>
            <p>The official timeline feed.</p>
        </div>

        <div id="dynamic-feed">
            <div class="loading-text">Loading the latest Queefs...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ybrlwkrqgsdfwwkjvtsv.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_HKZYaWXO2UgTjRUomm7M1w_tB1d47ET";
        
        const supabaseApp = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let userIpIdentifier = "anon_guest";
        let isSignUpMode = false;
        const ADMIN_EMAIL = "kuraihanaofficial@gmail.com";

        async function fetchUserIP() {
            try {
                let response = await fetch("https://api.ipify.org?format=json");
                let data = await response.json();
                if(data && data.ip) {
                    userIpIdentifier = "00000000-0000-0000-0000-" + data.ip.replace(/\./g, "").slice(0, 12).padStart(12, '0');
                }
            } catch(err) { console.log("IP fetch fallback:", err); }
        }

        supabaseApp.auth.onAuthStateChange((event, session) => {
            currentUser = session?.user || null;
            const loginBtn = document.getElementById('login-btn');
            const mobileLoginBtn = document.getElementById('mobile-login-btn');
            
            const updateBtnText = (text) => {
                if(loginBtn) loginBtn.innerText = text;
                if(mobileLoginBtn) mobileLoginBtn.innerText = text;
            };

            if (currentUser) {
                updateBtnText("Log Out");
                const logoutAction = () => { supabaseApp.auth.signOut(); window.location.reload(); };
                if(loginBtn) loginBtn.onclick = logoutAction;
                if(mobileLoginBtn) mobileLoginBtn.onclick = logoutAction;
            } else {
                updateBtnText("Sign In");
                const loginAction = () => { openAuthModal(); };
                if(loginBtn) loginBtn.onclick = loginAction;
                if(mobileLoginBtn) mobileLoginBtn.onclick = loginAction;
            }
        });

        function openAuthModal() {
            closeMobileMenu();
            document.getElementById('authModal').classList.add('active');
        }
        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }
        function closeAuthModalViaOverlay(e) {
            if(e.target.id === "authModal") closeAuthModal();
        }
        function closeMobileMenu() {
            hamburger.classList.remove('active');
            mobileMenu.classList.remove('active');
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            const title = document.getElementById('modalTitle');
            const subtitle = document.getElementById('modalSubtitle');
            const btn = document.getElementById('modalSubmitBtn');
            const toggle = document.getElementById('modalToggleLink');

            if(isSignUpMode) {
                title.innerText = "Create Account";
                subtitle.innerText = "Sign up to join the conversation";
                btn.innerText = "Sign Up";
                toggle.innerHTML = "Already have an account? <span>Sign In</span>";
            } else {
                title.innerText = "Welcome Back";
                subtitle.innerText = "Log into your profile to start commenting";
                btn.innerText = "Sign In";
                toggle.innerHTML = "Don't have an account? <span>Sign Up</span>";
            }
        }

        async function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const btn = document.getElementById('modalSubmitBtn');
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            if(isSignUpMode) {
                let { data, error } = await supabaseApp.auth.signUp({ email, password });
                if(error) {
                    alert("Registration failed: " + error.message);
                    btn.innerText = "Sign Up";
                    btn.disabled = false;
                } else {
                    alert("Account registered successfully! Logging you in...");
                    window.location.reload();
                }
            } else {
                let { data, error } = await supabaseApp.auth.signInWithPassword({ email, password });
                if(error) {
                    alert("Login failed: " + error.message);
                    btn.innerText = "Sign In";
                    btn.disabled = false;
                } else {
                    window.location.reload();
                }
            }
        }

        const csvLink = "https://docs.google.com/spreadsheets/d/1pYMnzTwBwkopjhsTPxVgu_vAxg39o9uxmRb3e2oaMZo/export?format=csv";

        const artistData = {
            "Sarah Yamaguchi": { handle: "@sarahyamaguchi", image: "../sarahyamaguchi.png" },
            "Gabri Hannah": { handle: "@gabrihannah", image: "../gabrihannah.png" },
            "Kurai Hana": { handle: "@kuraihanaofi", image: "../kuraihana.png" },
            "Stella Sukehiro": { handle: "@stellasukehiro", image: "../stellasukehiro.png" },
            "Mazie LaRosa": { handle: "@mazielarosa", image: "../mazielarosa.png" },
            "Anna Martinez": { handle: "@annamartinez", image: "../annamartinez.jpg" },
            "Bhad Belle": { handle: "@bhadbelle", image: "../bhadbelle.png" },
            "Billoga": { handle: "@billoga", image: "../billoga.png" },
            "Queefy Records Official": { handle: "@queefyrecords", image: "../logo.jpeg" } 
        };

        function linkifyContent(text) {
            if(!text) return "";
            const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return escaped.replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`);
        }

        function generatePostId(artist, content) {
            let combined = (artist || "") + (content || "");
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = (hash << 5) - hash + combined.charCodeAt(i);
                hash |= 0;
            }
            return "qf_" + Math.abs(hash);
        }

        async function initFeed() {
            await fetchUserIP(); 

            if (csvLink) {
                Papa.parse(csvLink, {
                    download: true,
                    header: true,
                    complete: async function(results) {
                        const feed = document.getElementById('dynamic-feed');
                        feed.innerHTML = ""; 
                        let posts = results.data.reverse();

                        let dbLikes = [];
                        let dbComments = [];

                        try {
                            const { data: likesRes } = await supabaseApp.from('likes').select('*');
                            if (likesRes) dbLikes = likesRes;
                            const { data: commsRes } = await supabaseApp.from('comments').select('*').order('created_at', { ascending: true });
                            if (commsRes) dbComments = commsRes;
                        } catch (err) { console.log("Database fetch bypassed:", err); }

                        const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;

                        posts.forEach(post => {
                            if (!post["Artist Name"]) return;

                            let artistName = post["Artist Name"];
                            let content = post["Post Content"] || "";
                            let mediaUrl = post["Media URL"]; 
                            let time = post["Timestamp"] ? post["Timestamp"].split(" ")[0] : "Just now";
                            let profile = artistData[artistName] || { handle: "@artist", image: "../logo.jpeg" };

                            let uniquePostId = generatePostId(artistName, content);
                            let postLikesCount = dbLikes.filter(l => l.post_id === uniquePostId).length;
                            
                            let currentViewerId = currentUser ? currentUser.id : userIpIdentifier;
                            let userHasLiked = dbLikes.some(l => l.post_id === uniquePostId && l.user_id === currentViewerId) || localStorage.getItem("liked_" + uniquePostId) === "true";
                            let heartClass = userHasLiked ? "action-btn like-btn liked" : "action-btn like-btn";

                            let mediaHTML = '';
                            if (mediaUrl && mediaUrl.trim() !== "") {
                                if (mediaUrl.toLowerCase().includes('.mp4') || mediaUrl.toLowerCase().includes('.webm')) {
                                    mediaHTML = `<video src="${mediaUrl.trim()}" class="post-media" controls autoplay muted loop></video>`;
                                } else {
                                    mediaHTML = `<img src="${mediaUrl.trim()}" alt="Post Media" class="post-media">`;
                                }
                            }

                            let postCommentsHTML = '';
                            let currentPostComments = dbComments.filter(c => c.post_id === uniquePostId);
                            currentPostComments.forEach(c => {
                                let deleteButtonHTML = isAdmin ? `<button class="comment-delete-btn" onclick="deleteComment('${c.id}', this)">🗑️</button>` : '';
                                    postCommentsHTML += `
                                <div class="comment-item" id="comment_item_${c.id}">
                                    <span><strong>${c.username}:</strong> ${c.comment_text}</span>
                                    ${deleteButtonHTML}
                                </div>`;
                            });

                            // Added autocomplete="off" cleanly to comment node input matrices below
                            let postHTML = `
                            <div class="queef-post" id="card_${uniquePostId}">
                                <div class="post-header">
                                    <a href="profile.html?artist=${encodeURIComponent(artistName)}" class="profile-click-wrapper">
                                        <img src="${profile.image}" alt="${artistName}" class="post-avatar">
                                        <div class="post-info">
                                            <h4>${artistName} <span class="verified-badge"></span></h4>
                                            <span>${profile.handle} • ${time}</span>
                                        </div>
                                    </a>
                                </div>
                                <div class="post-content">${linkifyContent(content)}</div>
                                ${mediaHTML}
                                <div class="post-actions">
                                    <div class="${heartClass}" data-post-id="${uniquePostId}">
                                        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                        <span class="like-count">${postLikesCount}</span>
                                    </div>
                                </div>
                                
                                <div class="comments-section">
                                    <div class="comment-list" id="comments_list_${uniquePostId}">
                                        ${postCommentsHTML}
                                    </div>
                                    <div class="comment-input-box">
                                        <input type="text" id="input_${uniquePostId}" placeholder="Write a comment..." oninput="clearCommentError('${uniquePostId}')" autocomplete="off">
                                        <button class="comment-submit-btn" onclick="submitComment('${uniquePostId}')">Post</button>
                                    </div>
                                    <div class="comment-error-msg" id="error_${uniquePostId}">You must be signed in to post comments!</div>
                                </div>
                            </div>`;
                            
                            feed.innerHTML += postHTML;
                        });

                        document.querySelectorAll('.like-btn').forEach(btn => {
                            btn.addEventListener('click', async function() {
                                let postId = this.getAttribute('data-post-id');
                                let countSpan = this.querySelector('.like-count');
                                let currentCount = parseInt(countSpan.innerText);
                                let targetUserId = currentUser ? currentUser.id : userIpIdentifier;

                                if (this.classList.contains('liked')) {
                                    this.classList.remove('liked');
                                    countSpan.innerText = currentCount - 1;
                                    localStorage.removeItem("liked_" + postId);
                                    await supabaseApp.from('likes').delete().match({ post_id: postId, user_id: targetUserId });
                                } else {
                                    this.classList.add('liked');
                                    countSpan.innerText = currentCount + 1;
                                    localStorage.setItem("liked_" + postId, "true");
                                    await supabaseApp.from('likes').insert([{ post_id: postId, user_id: targetUserId }]);
                                }
                            });
                        });
                    }
                });
            }
        }

        async function submitComment(postId) {
            const errorLabel = document.getElementById(`error_${postId}`);
            
            if(!currentUser) { 
                if(errorLabel) errorLabel.style.display = "block";
                return; 
            }
            
            const inputField = document.getElementById(`input_${postId}`);
            const commentText = inputField.value.trim();
            if(!commentText) return;

            const username = currentUser.email.split('@')[0];

            const { data, error } = await supabaseApp.from('comments').insert([
                { post_id: postId, user_id: currentUser.id, username: username, comment_text: commentText }
            ]).select();

            if(error) {
                alert("Error submitting comment: " + error.message);
            } else {
                const list = document.getElementById(`comments_list_${postId}`);
                if(list && data && data[0]) {
                    let commentId = data[0].id;
                    const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;
                    let deleteButtonHTML = isAdmin ? `<button class="comment-delete-btn" onclick="deleteComment('${commentId}', this)">🗑️</button>` : '';
                    
                    list.innerHTML += `
                    <div class="comment-item" id="comment_item_${commentId}">
                        <span><strong>${username}:</strong> ${commentText}</span>
                        ${deleteButtonHTML}
                    </div>`;
                }
                if(inputField) inputField.value = "";
                if(errorLabel) errorLabel.style.display = "none";
            }
        }

        async function deleteComment(commentId, buttonElement) {
            if(!confirm("Are you sure you want to delete this comment?")) return;
            
            const { error } = await supabaseApp
                .from('comments')
                .delete()
                .eq('id', commentId);

            if(error) {
                alert("Could not remove record: " + error.message);
            } else {
                const targetNode = document.getElementById(`comment_item_${commentId}`);
                if(targetNode) targetNode.remove();
            }
        }

        function clearCommentError(postId) {
            const errorLabel = document.getElementById(`error_${postId}`);
            if(errorLabel) errorLabel.style.display = "none";
        }

        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
        });

        initFeed();
    </script>
</body>
</html>
