<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portal | OnlyQueefs Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #030008;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                radial-gradient(circle at 85% 25%, rgba(0, 191, 255, 0.18) 0%, transparent 35%),
                radial-gradient(circle at 15% 75%, rgba(255, 59, 180, 0.15) 0%, transparent 40%);
            z-index: -1;
            filter: blur(40px);
        }

        .portal-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .portal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .portal-header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #30d5ff 50%, #ff73ca 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .portal-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .portal-input, .portal-textarea, .portal-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .portal-select option {
            background: #110c1a;
            color: white;
        }

        .portal-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .portal-input:focus, .portal-textarea:focus, .portal-select:focus {
            border-color: #30d5ff;
        }

        .portal-btn {
            width: 100%;
            background: linear-gradient(135deg, #00bfff 0%, #ff3bb4 100%);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 191, 255, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .portal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0, 191, 255, 0.3);
        }

        /* Result Display Box */
        .output-box {
            display: none;
            margin-top: 25px;
            background: rgba(0,0,0,0.5);
            border: 1px dashed rgba(48, 213, 255, 0.4);
            padding: 20px;
            border-radius: 16px;
            animation: fadeIn 0.3s ease;
        }

        .output-title {
            font-size: 0.85rem;
            color: #30d5ff;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: left;
        }

        .output-string {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #ff73ca;
            word-break: break-all;
            user-select: all;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .sheet-btn {
            background: #21a366;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-workflow { display: none; }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="portal-header">
            <h1>Artist Workspace</h1>
            <p id="portal-status">Please log in with your verified credentials</p>
        </div>

        <div id="auth-gate">
            <form onsubmit="handleArtistLogin(event)">
                <div class="form-group">
                    <label for="artistEmail">Verified Label Email</label>
                    <input type="email" id="artistEmail" class="portal-input" placeholder="name@queefyrecords.com" required>
                </div>
                <div class="form-group">
                    <label for="artistPassword">Security Key</label>
                    <input type="password" id="artistPassword" class="portal-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="portal-btn">Access Dashboard</button>
            </form>
        </div>

        <div id="workspace-area" class="hidden-workflow">
            <form onsubmit="generatePostRow(event)">
                <div class="form-group">
                    <label for="artistSelect">Posting Identity</label>
                    <select id="artistSelect" class="portal-select">
                        <option value="Sarah Yamaguchi">Sarah Yamaguchi</option>
                        <option value="Gabri Hannah">Gabri Hannah</option>
                        <option value="Kurai Hana">Kurai Hana</option>
                        <option value="Stella Sukehiro">Stella Sukehiro</option>
                        <option value="Mazie LaRosa">Mazie LaRosa</option>
                        <option value="Anna Martinez">Anna Martinez</option>
                        <option value="Bhad Belle">Bhad Belle</option>
                        <option value="Billoga">Billoga</option>
                        <option value="Queefy Records Official">Queefy Records Official</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="postContent">Queef Feed Message Content</label>
                    <textarea id="postContent" class="portal-textarea" placeholder="What's dropping next? Links transform automatically..."></textarea>
                </div>

                <div class="form-group">
                    <label for="mediaUrl">Media Link Attachment (Optional Image/Video URL)</label>
                    <input type="url" id="mediaUrl" class="portal-input" placeholder="https://domain.com/file.mp4 or .png">
                </div>

                <button type="submit" class="portal-btn">Generate Spreadsheet Line</button>
            </form>

            <div class="output-box" id="outputBox">
                <div class="output-title">📋 Copy this entire row:</div>
                <div class="output-string" id="csvRowOutput"></div>
                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.4); margin-bottom: 12px;"> Paste this line as a new row at the very bottom of your database sheet.</p>
                <a href="https://docs.google.com/spreadsheets/d/1pYMnzTwBwkopjhsTPxVgu_vAxg39o9uxmRb3e2oaMZo/edit" target="_blank" class="sheet-btn">Open Database Sheet ↗</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ybrlwkrqgsdfwwkjvtsv.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_HKZYaWXO2UgTjRUomm7M1w_tB1d47ET";
        const supabaseApp = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check if an artist session already exists when mounting
        window.onload = async () => {
            const { data: { session } } = await supabaseApp.auth.getSession();
            if (session) {
                showWorkspace(session.user.email);
            }
        };

        async function handleArtistLogin(e) {
            e.preventDefault();
            const email = document.getElementById('artistEmail').value;
            const password = document.getElementById('artistPassword').value;

            let { data, error } = await supabaseApp.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Access Denied: " + error.message);
            } else {
                showWorkspace(email);
            }
        }

        function showWorkspace(email) {
            document.getElementById('auth-gate').style.display = 'none';
            document.getElementById('workspace-area').style.display = 'block';
            document.getElementById('portal-status').innerText = "Logged in as: " + email;
        }

        function generatePostRow(e) {
            e.preventDefault();
            
            const artist = document.getElementById('artistSelect').value;
            let content = document.getElementById('postContent').value.trim();
            let media = document.getElementById('mediaUrl').value.trim();
            
            // Format current date matching your timestamp structure (MM/DD/YYYY)
            const d = new Date();
            const timestamp = `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()} 12:00:00`;

            // Clean quotes so CSV row formats nicely
            content = content.replace(/"/g, '""');

            // Construct exact matching Google Sheet column mapping configuration parameters
            const cleanCSVRow = `"${timestamp}","${artist}","${content}","${media}"`;

            document.getElementById('csvRowOutput').innerText = cleanCSVRow;
            document.getElementById('outputBox').style.display = 'block';
        }
    </script>
</body>
</html>
