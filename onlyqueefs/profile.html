<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile | OnlyQueefs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #030008;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(255, 59, 180, 0.18) 0%, transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(0, 191, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.1) 0%, transparent 45%);
            z-index: -1;
            filter: blur(40px);
        }

        @keyframes liquidText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px) saturate(240%);
            -webkit-backdrop-filter: blur(40px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                -0.6px 0 1px rgba(255, 0, 128, 0.4),  
                0.6px 0 1px rgba(0, 229, 255, 0.4),  
                0 10px 40px rgba(0, 0, 0, 0.5),      
                inset 0 1px 1px rgba(255, 255, 255, 0.3); 
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 59, 180, 0.6);
            object-fit: cover;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #ffffff 0%, #ff73ca 50%, #30d5ff 100%);
            background-size: 200% 200%;
            animation: liquidText 4s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            padding: 6px 0;
        }

        nav a:hover { color: #ffffff; }

        /* Profile Layout */
        .profile-container {
            max-width: 650px;
            margin: 100px auto 100px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.2);
        }

        /* Glass Banner */
        .profile-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, rgba(255, 59, 180, 0.3), rgba(0, 191, 255, 0.3));
            position: relative;
            overflow: hidden;
        }

        .profile-banner::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(3, 0, 8, 0.8), transparent);
        }

        .profile-header-info {
            padding: 0 25px 25px;
            position: relative;
            margin-top: -60px;
        }

        .profile-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 15px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #030008;
            object-fit: cover;
            position: relative;
            z-index: 10;
            background: #111;
        }

        .follow-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .follow-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .follow-btn.following {
            background: transparent;
            border-color: #ff3bb4;
            color: #ff3bb4;
        }

        .profile-name {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .verified-badge {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #00e5ff;
            border-radius: 50%;
            position: relative;
        }
        .verified-badge::after {
            content: '✓';
            color: #030008;
            font-size: 12px;
            font-weight: 900;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        .profile-handle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .profile-bio {
            font-size: 1.05rem;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            font-size: 0.95rem;
        }

        .profile-stats span {
            color: rgba(255, 255, 255, 0.5);
        }

        .profile-stats strong {
            color: #fff;
            font-weight: 700;
        }

        /* Profile Tabs */
        .profile-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn:hover { color: #fff; }

        .tab-btn.active {
            color: #fff;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: #ff3bb4;
            border-radius: 3px 3px 0 0;
            box-shadow: 0 -2px 10px rgba(255, 59, 180, 0.5);
        }

        /* Posts Styling (Adapted for Profile) */
        .feed-wrapper {
            padding: 0 20px 20px;
        }

        .queef-post {
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeIn 0.5s ease forwards;
        }

        .queef-post:last-child { border-bottom: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-avatar {
            width: 45px; height: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-info h4 { font-size: 1rem; color: #fff; }
        .post-info span { font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); }

        .post-content {
            font-size: 1.05rem;
            line-height: 1.4;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }

        .post-media {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .post-actions {
            display: flex;
            gap: 25px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .action-btn:hover { color: #00e5ff; }
        .action-btn.liked { color: #ff3bb4; }

        .loading-text { text-align: center; color: rgba(255,255,255,0.5); padding: 30px; }

        @media (max-width: 768px) {
            header { top: 12px; padding: 10px 20px; width: 95%; }
            nav { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="../logo.jpeg" alt="Logo" class="brand-logo">
            <div class="logo-text">Queefy Records69</div>
        </div>
        <nav>
            <a href="../index.html">Home</a>
            <a href="../index.html#roster">Roster</a>
            <a href="index.html">Back to Feed</a>
        </nav>
    </header>

    <main class="profile-container">
        
        <div class="profile-banner"></div>
        
        <div class="profile-header-info">
            <div class="profile-header-top">
                <img src="../logo.jpeg" alt="Avatar" class="profile-avatar" id="prof-avatar">
                <button class="follow-btn" id="follow-btn">Follow</button>
            </div>
            
            <h1 class="profile-name"><span id="prof-name">Loading...</span> <span class="verified-badge"></span></h1>
            <p class="profile-handle" id="prof-handle">@loading</p>
            <p class="profile-bio" id="prof-bio">Exclusive Queefy Records69 Artist.</p>
            
            <div class="profile-stats">
                <span><strong id="prof-following">12</strong> Following</span>
                <span><strong id="prof-followers">0</strong> Followers</span>
            </div>
        </div>

        <div class="profile-tabs">
            <div class="tab-btn active" onclick="switchTab('posts')">Posts</div>
            <div class="tab-btn" onclick="switchTab('reposts')">Reposts</div>
            <div class="tab-btn" onclick="switchTab('media')">Media</div>
        </div>

        <div class="feed-wrapper" id="dynamic-profile-feed">
            <div class="loading-text">Loading artist feed...</div>
        </div>

    </main>

    <script>
        const csvLink = "https://docs.google.com/spreadsheets/d/1pYMnzTwBwkopjhsTPxVgu_vAxg39o9uxmRb3e2oaMZo/export?format=csv";

        const artistData = {
            "Sarah Yamaguchi": { handle: "@sarahyamaguchi", image: "../sarahyamaguchi.png", bio: "Electropop princess. 💅" },
            "Gabri Hannah": { handle: "@gabrihannah", image: "../gabrihannah.png", bio: "i just wanna shoot bubbles outta my clit" },
            "Kurai Hana": { handle: "@kuraihanaofi", image: "../kuraihana.png", bio: 'Singer under "M.A.R.A Entertainment" and "Queefy Records69" <br> <br> Manager of Queefy Records69 and Co-Manager of M.A.R.A Entertainment' },
            "Stella Sukehiro": { handle: "@stellasukehiro", image: "../stellasukehiro.png", bio: "Electronic Pop frequencies." },
            "Mazie LaRosa": { handle: "@mazielarosa", image: "../mazielarosa.png", bio: "Alternative Pop." },
            "Anna Martinez": { handle: "@annamartinez", image: "../annamartinez.jpg", bio: "Pop." },
            "Bhad Belle": { handle: "@bhadbelle", image: "../bhadbelle.png", bio: "Pop." },
            "Billoga": { handle: "@billoga", image: "../billoga.png", bio: "Pop." }
        };

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        const urlParams = new URLSearchParams(window.location.search);
        let currentArtist = urlParams.get('artist');

        if (!currentArtist || !artistData[currentArtist]) {
            currentArtist = "Sarah Yamaguchi"; 
        }

        const profile = artistData[currentArtist];
        document.getElementById('prof-avatar').src = profile.image;
        document.getElementById('prof-name').innerText = currentArtist;
        document.getElementById('prof-handle').innerText = profile.handle;
        document.getElementById('prof-bio').innerHTML = profile.bio;

        let baseFollowers = (hashCode(currentArtist) % 800) + 120;
        let followerString = baseFollowers + "." + (hashCode(profile.handle) % 9) + "K";
        document.getElementById('prof-followers').innerText = followerString;

        const followBtn = document.getElementById('follow-btn');
        let isFollowing = localStorage.getItem('follow_' + currentArtist) === 'true';
        
        if(isFollowing) {
            followBtn.classList.add('following');
            followBtn.innerText = "Following";
        }

        followBtn.addEventListener('click', () => {
            if(followBtn.classList.contains('following')) {
                followBtn.classList.remove('following');
                followBtn.innerText = "Follow";
                localStorage.removeItem('follow_' + currentArtist);
            } else {
                followBtn.classList.add('following');
                followBtn.innerText = "Following";
                localStorage.setItem('follow_' + currentArtist, 'true');
            }
        });

        let allArtistPosts = [];

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const feed = document.getElementById('dynamic-profile-feed');
            feed.innerHTML = '';

            if(tabName === 'reposts') {
                feed.innerHTML = '<div class="loading-text">No reposts yet.</div>';
                return;
            }

            let postsToShow = allArtistPosts;
            if(tabName === 'media') {
                postsToShow = allArtistPosts.filter(p => p["Media URL"] && p["Media URL"].trim() !== "");
                if(postsToShow.length === 0) {
                    feed.innerHTML = '<div class="loading-text">No media posted yet.</div>';
                    return;
                }
            }

            renderPosts(postsToShow);
        }

        function renderPosts(posts) {
            const feed = document.getElementById('dynamic-profile-feed');
            
            if (posts.length === 0) {
                feed.innerHTML = '<div class="loading-text">No posts yet.</div>';
                return;
            }

            posts.forEach(post => {
                let content = post["Post Content"] || "";
                let mediaUrl = post["Media URL"]; 
                let time = post["Timestamp"] ? post["Timestamp"].split(" ")[0] : "Just now";
                
                let uniquePostId = "post_" + hashCode(currentArtist + content + time);
                let baseLikes = (hashCode(content + currentArtist) % 3700) + 300;
                
                let isLiked = localStorage.getItem(uniquePostId) === "liked";
                let displayLikes = isLiked ? baseLikes + 1 : baseLikes;
                let heartClass = isLiked ? "action-btn like-btn liked" : "action-btn like-btn";

                let mediaHTML = '';
                if (mediaUrl && mediaUrl.trim() !== "") {
                    if (mediaUrl.toLowerCase().includes('.mp4') || mediaUrl.toLowerCase().includes('.webm')) {
                        mediaHTML = `<video src="${mediaUrl.trim()}" class="post-media" controls autoplay muted loop></video>`;
                    } else {
                        mediaHTML = `<img src="${mediaUrl.trim()}" alt="Media" class="post-media">`;
                    }
                }

                let postHTML = `
                <div class="queef-post">
                    <div class="post-header">
                        <img src="${profile.image}" alt="${currentArtist}" class="post-avatar">
                        <div class="post-info">
                            <h4>${currentArtist} <span class="verified-badge"></span></h4>
                            <span>${profile.handle} • ${time}</span>
                        </div>
                    </div>
                    <div class="post-content">${content}</div>
                    ${mediaHTML}
                    <div class="post-actions">
                        <div class="${heartClass}" data-post-id="${uniquePostId}" data-base-likes="${baseLikes}">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            <span class="like-count">${displayLikes.toLocaleString()}</span>
                        </div>
                        <div class="action-btn">
                            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10z"/></svg>
                            <span>${(baseLikes % 85) + 12}</span>
                        </div>
                    </div>
                </div>`;
                
                feed.innerHTML += postHTML;
            });

            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    let countSpan = this.querySelector('.like-count');
                    let baseNumber = parseInt(this.getAttribute('data-base-likes'));
                    let postId = this.getAttribute('data-post-id');

                    if (this.classList.contains('liked')) {
                        this.classList.remove('liked');
                        countSpan.innerText = baseNumber.toLocaleString();
                        localStorage.removeItem(postId); 
                    } else {
                        this.classList.add('liked');
                        countSpan.innerText = (baseNumber + 1).toLocaleString();
                        localStorage.setItem(postId, "liked"); 
                    }
                });
            });
        }

        if (csvLink) {
            Papa.parse(csvLink, {
                download: true,
                header: true,
                complete: function(results) {
                    allArtistPosts = results.data.filter(post => post["Artist Name"] === currentArtist).reverse();
                    
                    const feed = document.getElementById('dynamic-profile-feed');
                    feed.innerHTML = ""; 
                    
                    renderPosts(allArtistPosts);
                }
            });
        }
    </script>

</body>
</html>
