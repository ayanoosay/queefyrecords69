<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile | OnlyQueefs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #030008;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(255, 59, 180, 0.18) 0%, transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(0, 191, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(255, 0, 128, 0.1) 0%, transparent 45%);
            z-index: -1;
            filter: blur(40px);
        }

        header {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 28px;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(40px) saturate(240%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 1000;
        }

        .brand { display: flex; align-items: center; gap: 14px; }
        .brand-logo { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        .logo-text { font-size: 1.25rem; font-weight: 800; color: white;}

        nav a {
            color: rgba(255, 255, 255, 0.75);
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .profile-container {
            max-width: 650px;
            margin: 120px auto 100px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            overflow: hidden;
        }

        .profile-banner { width: 100%; height: 200px; background: linear-gradient(45deg, #ff3bb4, #00bfff); }
        .profile-header-info { padding: 0 25px 25px; margin-top: -60px; position: relative;}
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #030008; object-fit: cover; }
        .profile-name { font-size: 1.8rem; font-weight: 800; margin-top: 10px; display: flex; align-items: center; gap: 6px;}
        .verified-badge { display: inline-block; width: 18px; height: 18px; background: #00e5ff; border-radius: 50%; position: relative; }
        .verified-badge::after { content: '✓'; color: #030008; font-size: 12px; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .profile-handle { color: rgba(255, 255, 255, 0.5); margin-bottom: 15px; }
        .profile-bio { margin-bottom: 15px; line-height: 1.4; }

        /* Profile Tabs Restored Styles */
        .profile-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }

        .tab-btn:hover { color: #fff; }
        .tab-btn.active { color: #fff; }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: #ff3bb4;
            border-radius: 3px 3px 0 0;
            box-shadow: 0 -2px 10px rgba(255, 59, 180, 0.5);
        }

        .feed-wrapper { padding: 20px; }
        .queef-post { padding: 20px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .queef-post:last-child { border-bottom: none; }
        .post-content { margin: 10px 0; font-size: 1.05rem; white-space: pre-wrap; word-break: break-word; }
        .post-content a { color: #30d5ff; text-decoration: none; }
        .post-media { width: 100%; border-radius: 12px; max-height: 400px; object-fit: cover; margin-top: 10px; margin-bottom: 10px; }
        .post-actions { display: flex; gap: 25px; margin-top: 15px; }
        .action-btn { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
        .action-btn svg { width: 20px; height: 20px; fill: currentColor; }
        .action-btn.liked { color: #ff3bb4; }
        .loading-text { text-align: center; color: rgba(255,255,255,0.5); padding: 30px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <img src="../logo.jpeg" alt="Logo" class="brand-logo">
            <div class="logo-text">Queefy Records69</div>
        </div>
        <nav>
            <a href="../index.html">Home</a>
            <a href="../index.html#roster">Roster</a>
            <a href="index.html">Back to Feed</a>
        </nav>
    </header>

    <main class="profile-container">
        <div class="profile-banner"></div>
        <div class="profile-header-info">
            <img src="../logo.jpeg" alt="Avatar" class="profile-avatar" id="prof-avatar">
            <h1 class="profile-name"><span id="prof-name">Loading...</span> <span class="verified-badge"></span></h1>
            <p class="profile-handle" id="prof-handle">@loading</p>
            <p class="profile-bio" id="prof-bio">Exclusive Queefy Records69 Artist.</p>
        </div>

        <div class="profile-tabs">
            <div class="tab-btn active" onclick="switchTab('posts', event)">Posts</div>
            <div class="tab-btn" onclick="switchTab('reposts', event)">Reposts</div>
            <div class="tab-btn" onclick="switchTab('media', event)">Media</div>
        </div>

        <div class="feed-wrapper" id="dynamic-profile-feed">
            <div class="loading-text">Loading artist feed...</div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://ybrlwkrqgsdfwwkjvtsv.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_HKZYaWXO2UgTjRUomm7M1w_tB1d47ET";
        
        const supabaseApp = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;
        let userIpIdentifier = "anon_guest";
        let allArtistPosts = []; // Globally cache artist posts for reactive tab filtering
        let globalDbLikes = [];

        async function fetchUserIP() {
            try {
                let response = await fetch("https://api.ipify.org?format=json");
                let data = await response.json();
                if(data && data.ip) {
                    userIpIdentifier = "00000000-0000-0000-0000-" + data.ip.replace(/\./g, "").slice(0, 12).padStart(12, '0');
                }
            } catch(err) { console.log("IP fallback fetch issue:", err); }
        }

        const csvLink = "https://docs.google.com/spreadsheets/d/1pYMnzTwBwkopjhsTPxVgu_vAxg39o9uxmRb3e2oaMZo/export?format=csv";

        const artistData = {
            "Sarah Yamaguchi": { handle: "@sarahyamaguchi", image: "../sarahyamaguchi.png", bio: "Electropop princess. 💅" },
            "Gabri Hannah": { handle: "@gabrihannah", image: "../gabrihannah.png", bio: "i just wanna shoot bubbles outta my clit" },
            "Kurai Hana": { handle: "@kuraihanaofi", image: "../kuraihana.png", bio: 'Singer under "M.A.R.A Entertainment" and "Queefy Records69" <br><br> Manager of Queefy Records69' },
            "Stella Sukehiro": { handle: "@stellasukehiro", image: "../stellasukehiro.png", bio: "Electronic Pop frequencies." },
            "Mazie LaRosa": { handle: "@mazielarosa", image: "../mazielarosa.png", bio: "Alternative Pop." },
            "Anna Martinez": { handle: "@annamartinez", image: "../annamartinez.jpg", bio: "Pop." },
            "Bhad Belle": { handle: "@bhadbelle", image: "../bhadbelle.png", bio: "Pop." },
            "Billoga": { handle: "@billoga", image: "../billoga.png", bio: "Pop." }
        };

        const urlParams = new URLSearchParams(window.location.search);
        let currentArtist = urlParams.get('artist') || "Sarah Yamaguchi";

        const profile = artistData[currentArtist];
        document.getElementById('prof-avatar').src = profile.image;
        document.getElementById('prof-name').innerText = currentArtist;
        document.getElementById('prof-handle').innerText = profile.handle;
        document.getElementById('prof-bio').innerHTML = profile.bio;

        function linkifyContent(text) {
            if(!text) return "";
            const escaped = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return escaped.replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`);
        }

        function generatePostId(artist, content) {
            let combined = (artist || "") + (content || "");
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = (hash << 5) - hash + combined.charCodeAt(i);
                hash |= 0;
            }
            return "qf_" + Math.abs(hash);
        }

        function switchTab(tabName, event) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');

            const feed = document.getElementById('dynamic-profile-feed');
            feed.innerHTML = '';

            if(tabName === 'reposts') {
                feed.innerHTML = '<div class="loading-text">No reposts yet.</div>';
                return;
            }

            let postsToShow = allArtistPosts;
            if(tabName === 'media') {
                postsToShow = allArtistPosts.filter(p => p["Media URL"] && p["Media URL"].trim() !== "");
                if(postsToShow.length === 0) {
                    feed.innerHTML = '<div class="loading-text">No media posted yet.</div>';
                    return;
                }
            }

            renderProfilePosts(postsToShow);
        }

        function renderProfilePosts(posts) {
            const feed = document.getElementById('dynamic-profile-feed');
            if(posts.length === 0) {
                feed.innerHTML = '<div class="loading-text">No posts yet from this artist.</div>';
                return;
            }

            posts.forEach(post => {
                let content = post["Post Content"] || "";
                let mediaUrl = post["Media URL"];
                let uniquePostId = generatePostId(currentArtist, content);
                let postLikesCount = globalDbLikes.filter(l => l.post_id === uniquePostId).length;
                
                let currentViewerId = currentUser ? currentUser.id : userIpIdentifier;
                let userHasLiked = globalDbLikes.some(l => l.post_id === uniquePostId && l.user_id === currentViewerId) || localStorage.getItem("liked_" + uniquePostId) === "true";

                let heartClass = userHasLiked ? "action-btn like-btn liked" : "action-btn like-btn";

                let mediaHTML = '';
                if (mediaUrl && mediaUrl.trim() !== "") {
                    if (mediaUrl.toLowerCase().includes('.mp4') || mediaUrl.toLowerCase().includes('.webm')) {
                        mediaHTML = `<video src="${mediaUrl.trim()}" class="post-media" controls autoplay muted loop></video>`;
                    } else {
                        mediaHTML = `<img src="${mediaUrl.trim()}" alt="Media" class="post-media">`;
                    }
                }

                feed.innerHTML += `
                <div class="queef-post">
                    <div class="post-content">${linkifyContent(content)}</div>
                    ${mediaHTML}
                    <div class="post-actions">
                        <div class="${heartClass}" data-post-id="${uniquePostId}">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                            <span class="like-count">${postLikesCount}</span>
                        </div>
                    </div>
                </div>`;
            });

            // Re-apply event handling triggers to newly rendered elements
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', async function() {
                    let postId = this.getAttribute('data-post-id');
                    let countSpan = this.querySelector('.like-count');
                    let currentCount = parseInt(countSpan.innerText);
                    let targetUserId = currentUser ? currentUser.id : userIpIdentifier;

                    if (this.classList.contains('liked')) {
                        this.classList.remove('liked');
                        countSpan.innerText = currentCount - 1;
                        localStorage.removeItem("liked_" + postId);
                        await supabaseApp.from('likes').delete().match({ post_id: postId, user_id: targetUserId });
                    } else {
                        this.classList.add('liked');
                        countSpan.innerText = currentCount + 1;
                        localStorage.setItem("liked_" + postId, "true");
                        await supabaseApp.from('likes').insert([{ post_id: postId, user_id: targetUserId }]);
                    }
                });
            });
        }

        async function initProfileFeed() {
            await fetchUserIP();
            
            const { data: sessionData } = await supabaseApp.auth.getSession();
            currentUser = sessionData?.session?.user || null;

            if (csvLink) {
                Papa.parse(csvLink, {
                    download: true,
                    header: true,
                    complete: async function(results) {
                        allArtistPosts = results.data.filter(post => post["Artist Name"] === currentArtist).reverse();
                        
                        try {
                            const { data: likesRes } = await supabaseApp.from('likes').select('*');
                            if (likesRes) globalDbLikes = likesRes;
                        } catch (err) { console.log("Database lookup bypass:", err); }

                        switchTab('posts'); // Run master active layout render parameter pipeline
                    }
                });
            }
        }

        initProfileFeed();
    </script>
</body>
</html>
